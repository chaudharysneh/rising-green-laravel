name: Build with Docker and Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
      - dev-raj

jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t my-app .

      - name: Extract Build Files from Docker
        run: |
          docker create --name temp_container my-app
          docker cp temp_container:/var/www/html ./build_output
          docker rm temp_container

      - name: Clean unwanted folders from build_output
        run: |
          rm -rf ./build_output/vendor
          rm -rf ./build_output/vendor_old
          rm -rf ./build_output/system
          rm -rf ./build_output/node_modules
          rm -rf ./build_output/.git
          rm -f ./build_output/.gitignore
          rm -f ./build_output/.gitattributes
          # Keep storage/app/public for image uploads
          # Only remove specific cache files
          rm -rf ./build_output/storage/logs/*
          rm -rf ./build_output/storage/framework/cache/*
          rm -rf ./build_output/storage/framework/sessions/*
          rm -rf ./build_output/storage/framework/views/*
          # DO NOT DELETE: Keep existing uploads
          # rm -rf ./build_output/public/upload
          # rm -rf ./build_output/public/uploads
          rm -rf ./build_output/public/assets/img/
          # Ensure storage directories exist with proper structure
          mkdir -p ./build_output/storage/app/public/make
          mkdir -p ./build_output/storage/app/public/categories
          mkdir -p ./build_output/storage/app/public/products
          mkdir -p ./build_output/storage/app/public/bom-products
          mkdir -p ./build_output/storage/app/public/leads
          mkdir -p ./build_output/storage/app/public/customers
          mkdir -p ./build_output/storage/app/public/vendors
          mkdir -p ./build_output/storage/app/public/users
          mkdir -p ./build_output/storage/app/public/avatars
          mkdir -p ./build_output/storage/app/public/company
          mkdir -p ./build_output/storage/app/public/documents
          mkdir -p ./build_output/storage/app/public/estimates
          
          # Create public/storage directory structure for cPanel
          mkdir -p ./build_output/public/storage/make
          mkdir -p ./build_output/public/storage/categories
          mkdir -p ./build_output/public/storage/products
          mkdir -p ./build_output/public/storage/bom-products
          mkdir -p ./build_output/public/storage/leads
          mkdir -p ./build_output/public/storage/customers
          mkdir -p ./build_output/public/storage/vendors
          mkdir -p ./build_output/public/storage/users
          mkdir -p ./build_output/public/storage/avatars
          mkdir -p ./build_output/public/storage/company
          mkdir -p ./build_output/public/storage/documents
          mkdir -p ./build_output/public/storage/estimates

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 82.29.163.188
          username: "u378554361.rising-green-energy-crm.fableadtech.in"
          password: "V5!MMMwbYrJ6Imr>"
          server-dir: /
          local-dir: ./build_output/
          protocol: ftp
          port: 21
          timeout: 600000
          exclude: |
            **/.git*
            **/.env
            **/vendor/**
            **/vendor_old/**
            **/system/**
            **/node_modules/**
            **/app/Config/App.php
            **/app/Config/Database.php
            **/app/Config/Email.php
            **/app/Config/Paths.php
            **/app/Config/Encryption.php
            **/app/Config/Logger.php
          # Note: Removed exclusion of storage directories to preserve images

      - name: Create .htaccess for storage access (cPanel compatible)
        run: |
          # Create .htaccess in public/storage for direct file access
          cat > ./build_output/public/storage/.htaccess << 'EOF'
          Options +FollowSymLinks
          RewriteEngine On
          
          # Redirect to actual storage location
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^(.*)$ ../../storage/app/public/$1 [L]
          
          # Allow direct access to existing files
          RewriteCond %{REQUEST_FILENAME} -f
          RewriteRule ^(.*)$ $1 [L]
          
          # Prevent directory browsing
          Options -Indexes
          EOF
          
          # Create index.php in public/storage for fallback routing
          cat > ./build_output/public/storage/index.php << 'EOF'
          <?php
          // Storage file router for cPanel compatibility
          $requestUri = $_SERVER['REQUEST_URI'];
          $path = parse_url($requestUri, PHP_URL_PATH);
          
          // Remove /storage/ from path to get actual file path
          $filePath = str_replace('/storage/', '', $path);
          $actualFile = __DIR__ . '/../../storage/app/public/' . $filePath;
          
          if (file_exists($actualFile) && is_file($actualFile)) {
              // Get mime type
              $mimeType = mime_content_type($actualFile);
              
              // Set headers
              header('Content-Type: ' . $mimeType);
              header('Content-Length: ' . filesize($actualFile));
              header('Cache-Control: public, max-age=31536000');
              
              // Output file
              readfile($actualFile);
              exit;
          }
          
          // File not found
          http_response_code(404);
          echo "File not found";
          EOF
          
          # Create .htaccess in storage/app/public for direct access
          cat > ./build_output/storage/app/public/.htaccess << 'EOF'
          Options +FollowSymLinks
          RewriteEngine On
          
          # Allow direct access to files
          RewriteCond %{REQUEST_FILENAME} -f
          RewriteRule ^(.*)$ $1 [L]
          
          # Prevent directory browsing
          Options -Indexes
          
          # Set proper MIME types for images
          <FilesMatch "\.(jpg|jpeg|png|gif|webp|svg)$">
              Header set Cache-Control "public, max-age=31536000"
          </FilesMatch>
          EOF
